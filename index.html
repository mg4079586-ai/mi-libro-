<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    color: white;
    text-align: center;

    background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('fondo.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
/* INTRO */
#intro{
    padding:50px 20px;
}
h1 {
    font-size: 40px;
    text-shadow: 0px 0px 15px rgba(0,0,0,0.8);
}

p {
    font-size: 18px;
    opacity: 0.9;
}
.btn{
    padding:12px 20px;
    background:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* LIBRO */
#libro{
    display:none;
    margin:auto;
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
}

.pagina{
    background:white;
}

.pagina img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* CONTROLES */
.controls{
    display:none;
    margin:15px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    background: rgba(255,255,255,0.9);
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4d4d;
    color: white;
}

/* COMENTARIOS */
#comentarios{
    margin-top:50px;
    padding:20px;
}

<body>

<!-- INTRO -->
<div id="intro">
    <h1>18 Fragmentos de un Corazón Herido</h1>
    <p>Si llegaste hasta aquí… no estás solo.</p>
    <button class="btn" onclick="iniciar()">Comenzar lectura</button>
</div>

<!-- LIBRO -->
<div id="libro">

<!-- CONTROLES -->
<div class="controls" id="controls">
    <button onclick="$('#libro').turn('previous')">⬅</button>
    <button onclick="$('#libro').turn('next')">➡</button>
</div>

<!-- SONIDO -->
<audio id="sonido" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3"></audio>

<!-- COMENTARIOS -->
<div id="comentarios">
    <h2>💬 Opiniones</h2>
    <div id="disqus_thread"></div>
</div>

<script>
function iniciar(){

    document.getElementById("intro").style.display="none";
    document.getElementById("libro").style.display="block";
    document.getElementById("controls").style.display="block";

    let ancho = window.innerWidth;

    // 📱 MODO CELULAR
    if(ancho < 700){
        $("#libro").turn({
            width: ancho * 0.95,
            height: 500,
            display: "single",
            autoCenter:true
        });
    }
    // 💻 MODO COMPUTADORA
    else{
        $("#libro").turn({
            width: 900,
            height: 600,
            autoCenter:true
        });
    }

    $("#libro").bind("turning", function(){
        document.getElementById("sonido").play();
    });
}

/* DISQUS */
(function() {
var d = document, s = d.createElement('script');
s.src = 'https://mis-libros-1.disqus.com/embed.js';
s.setAttribute('data-timestamp', +new Date());
(d.body).appendChild(s);
})();
</script>
