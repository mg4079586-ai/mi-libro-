<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18 Fragmentos de un Corazón Herido</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Georgia, serif;
    color: white;
    text-align: center;
}

/* INTRO */
.intro {
    padding: 60px 20px;
}
.intro h1 {
    font-size: 32px;
}
.intro p {
    max-width: 500px;
    margin: auto;
    opacity: 0.8;
}

/* BOTÓN */
.btn {
    margin-top: 20px;
    padding: 12px 20px;
    background: white;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* LIBRO */
#libro {
    display: none;
    width: 90%;
    max-width: 900px;
    height: 600px;
    margin: 40px auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
}

.pagina {
    background: white;
}
.pagina img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* CONTROLES */
.controls {
    display: none;
    margin-bottom: 20px;
}
button {
    padding: 10px 15px;
    border: none;
    background: white;
    cursor: pointer;
    border-radius: 5px;
    margin: 5px;
}

/* COMENTARIOS */
.comentarios {
    margin-top: 40px;
    padding: 20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
    <h1>18 Fragmentos de un Corazón Herido</h1>
    <p>
        “Si llegaste hasta aquí… probablemente también aprendiste a sonreír mientras te rompías por dentro.”
    </p>
    <button class="btn" onclick="iniciar()">Comenzar lectura</button>
</div>

<!-- LIBRO -->
<div id="libro">

<div class="pagina"><img src="libro_page-0001.jpg"></div>

<!-- CONTROLES -->
<div class="controls" id="controls">
    <button onclick="$('#libro').turn('previous')">⬅</button>
    <button onclick="$('#libro').turn('next')">➡</button>
</div>

<!-- SONIDO -->
<audio id="sonido" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3"></audio>

<!-- COMENTARIOS -->
<div class="comentarios">
    <h2>💬 Opiniones de lectores</h2>
    <div id="disqus_thread"></div>
</div>

<script>
function iniciar(){
    document.getElementById("intro").style.display = "none";
    document.getElementById("libro").style.display = "block";
    document.getElementById("controls").style.display = "block";

    $("#libro").turn({
        width: 900,
        height: 600,
        autoCenter: true,
        gradients: true
    });

    setTimeout(function(){
        $("#libro").turn("next");
    }, 1500);

    $("#libro").bind("turning", function(){
        document.getElementById("sonido").play();
    });
}

/* DISQUS REAL */
var disqus_config = function () {
this.page.url = window.location.href;
this.page.identifier = "libro";
};

(function() {
var d = document, s = d.createElement('script');

})();
</script>
